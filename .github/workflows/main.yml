name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Build APK (auto-confirm)
        run: |
          # Автоматически отвечаем "y" на все запросы
          yes | flet build apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: notes-app-apk
          path: build/apk
